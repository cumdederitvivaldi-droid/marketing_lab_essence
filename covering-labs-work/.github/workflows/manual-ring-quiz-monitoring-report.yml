name: Manual Ring Quiz Monitoring Report

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'KST 기준 보고일 (YYYY-MM-DD)'
        required: true
        type: string
      dry_run:
        description: 'Slack 발송 없이 리포트만 출력'
        required: false
        default: false
        type: boolean

concurrency:
  group: manual-ring-quiz-monitoring-report
  cancel-in-progress: false

env:
  PROJECT_ID: covering-app-ccd23
  INSTANCE: covering-labs-instance-20260306-050059
  ZONE: asia-northeast3-a
  APP_DIR: /shared/apps/ring-quiz-monitoring-report

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Clean OS Login profile
        timeout-minutes: 5
        run: |
          SA_EMAIL=$(jq -r '.client_email' "$GOOGLE_APPLICATION_CREDENTIALS")
          echo "Cleaning OS Login profile for: $SA_EMAIL"
          PROFILE_ERR="$(mktemp)"
          if ! PROFILE=$(gcloud compute os-login describe-profile \
            --project="$PROJECT_ID" \
            --format=json 2>"$PROFILE_ERR"); then
            if grep -Eq 'NOT_FOUND|not found|404' "$PROFILE_ERR"; then
              PROFILE='{}'
            else
              cat "$PROFILE_ERR" >&2
              exit 1
            fi
          fi
          rm -f "$PROFILE_ERR"
          SSH_KEYS=$(printf '%s' "$PROFILE" | jq -r '.sshPublicKeys // {} | keys[]?')
          REMOVE_FAILED=0
          while IFS= read -r fp; do
            [ -z "$fp" ] && continue
            REMOVE_ERR="$(mktemp)"
            if gcloud compute os-login ssh-keys remove \
              --project="$PROJECT_ID" \
              --key="$fp" \
              --quiet 2>"$REMOVE_ERR"; then
              echo "Removed SSH key: $fp"
            elif grep -Eq 'NOT_FOUND|not found|404' "$REMOVE_ERR"; then
              echo "SSH key already absent: $fp"
            else
              cat "$REMOVE_ERR" >&2
              echo "::error::Failed to remove SSH key: $fp" >&2
              REMOVE_FAILED=1
            fi
            rm -f "$REMOVE_ERR"
          done < <(printf '%s\n' "$SSH_KEYS")
          [ "$REMOVE_FAILED" -eq 0 ] || exit 1
          echo "OS Login profile cleaned"

      - name: Validate inputs
        env:
          REPORT_DATE_INPUT: ${{ inputs.report_date }}
        run: |
          REPORT_DATE="$REPORT_DATE_INPUT"
          if ! [[ "$REPORT_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::report_date는 YYYY-MM-DD 형식이어야 합니다: $REPORT_DATE"
            exit 1
          fi
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"

      - name: Run ring quiz report
        timeout-minutes: 15
        env:
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
        run: |
          EXTRA_FLAG=""
          if [ "$DRY_RUN_INPUT" = "true" ]; then
            EXTRA_FLAG="--dry-run"
          fi

          gcloud compute ssh "$INSTANCE" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --ssh-key-expire-after=10m \
            --quiet \
            --command="cd $APP_DIR && python3 src/main.py --report-date '$REPORT_DATE' $EXTRA_FLAG"
