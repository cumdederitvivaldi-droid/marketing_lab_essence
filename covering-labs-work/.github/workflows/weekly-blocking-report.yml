name: Weekly Blocking Rate Report

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 KST 10:00 (UTC 01:00)
  workflow_dispatch:
    inputs:
      days_back:
        description: '집계 기간 (일수, 기본 7)'
        required: false
        default: '7'

permissions:
  pull-requests: read
  issues: read

jobs:
  report:
    name: 주간 차단율 집계
    runs-on: ubuntu-latest
    steps:
      - name: 집계 및 Slack 전송
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DAYS_BACK: ${{ inputs.days_back || '7' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const daysBack = parseInt(process.env.DAYS_BACK) || 7;

            const now = new Date();
            const since = new Date(now - daysBack * 24 * 60 * 60 * 1000);

            // 지정 기간 머지된 PR 수집
            let page = 1;
            let allPRs = [];
            while (true) {
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: 'closed', per_page: 100, page,
                sort: 'updated', direction: 'desc'
              });
              const merged = prs.filter(pr => pr.merged_at && new Date(pr.merged_at) >= since);
              allPRs = allPRs.concat(merged);
              if (prs.length < 100) break;
              const oldestUpdated = new Date(prs[prs.length - 1].updated_at);
              if (oldestUpdated < since) break;
              page++;
            }

            // 각 PR의 라벨 조회 (병렬)
            const prWithLabels = await Promise.all(allPRs.map(async pr => {
              const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
                owner, repo, issue_number: pr.number
              });
              return { ...pr, labelNames: labelData.map(l => l.name) };
            }));

            const blockedPRs = [];
            const unblockedPRs = [];

            for (const pr of prWithLabels) {
              const l = pr.labelNames;
              // 차단된 PR: critical 탐지 + 후속 수정 없음 (pre-merge-fixed 여부 무관)
              if (l.includes('critical-detected') && !l.includes('had-followup')) {
                blockedPRs.push(`#${pr.number} ${pr.title}`);
              }
              // 미차단된 PR: critical 탐지 후 후속 수정이 발생한 원인 PR
              if (l.includes('critical-detected') && l.includes('had-followup')) {
                unblockedPRs.push(`#${pr.number} ${pr.title}`);
              }
            }

            const blocked = blockedPRs.length;
            const unblocked = unblockedPRs.length;
            const total = blocked + unblocked;
            const rate = total > 0 ? Math.round((blocked / total) * 100) : null;
            const status = rate === null ? '➖' : rate >= 80 ? '✅' : '⚠️';

            const fmt = d => d.toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul', month: 'long', day: 'numeric' });
            const isManual = context.eventName === 'workflow_dispatch';
            const periodLabel = isManual ? `최근 ${daysBack}일 (수동 재집계)` : `${fmt(since)} ~ ${fmt(now)}`;

            // Block Kit 메시지 구성
            const rateText = rate === null ? '집계 대상 없음' : `${rate}%`;
            const rateGoal = rate === null ? '' : rate >= 80 ? ' (목표 달성)' : ' (목표 미달)';
            const headerIcon = rate === null ? '' : rate >= 80 ? ' ✓' : ' ✗';

            const blocks = [
              {
                type: 'header',
                text: { type: 'plain_text', text: `AI PR 차단율 리포트${headerIcon}`, emoji: true }
              },
              {
                type: 'section',
                fields: [
                  { type: 'mrkdwn', text: `*기간*\n${periodLabel}` },
                  { type: 'mrkdwn', text: `*차단율*\n${rateText}${rateGoal}` }
                ]
              }
            ];

            if (rate !== null) {
              blocks.push({
                type: 'section',
                fields: [
                  { type: 'mrkdwn', text: `*차단된 PR*\n${blocked}건` },
                  { type: 'mrkdwn', text: `*미차단된 PR*\n${unblocked}건` }
                ]
              });
            }

            if (blockedPRs.length > 0 || unblockedPRs.length > 0) {
              blocks.push({ type: 'divider' });
            }
            if (blockedPRs.length > 0) {
              blocks.push({
                type: 'context',
                elements: [{ type: 'mrkdwn', text: `*차단된 PR*  ${blockedPRs.map(p => `\`${p}\``).join('  ')}` }]
              });
            }
            if (unblockedPRs.length > 0) {
              blocks.push({
                type: 'context',
                elements: [{ type: 'mrkdwn', text: `*미차단된 PR*  ${unblockedPRs.map(p => `\`${p}\``).join('  ')}` }]
              });
            }

            console.log(JSON.stringify(blocks, null, 2));

            if (!process.env.SLACK_BOT_TOKEN) {
              console.log('SLACK_BOT_TOKEN 미설정 — Slack 전송 생략');
              return;
            }

            const https = require('https');
            const payload = JSON.stringify({ channel: 'C0AUK6902BE', blocks });
            await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'slack.com',
                path: '/api/chat.postMessage',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json; charset=utf-8',
                  'Authorization': `Bearer ${process.env.SLACK_BOT_TOKEN}`,
                  'Content-Length': Buffer.byteLength(payload)
                }
              }, res => {
                res.resume();
                if (res.statusCode >= 200 && res.statusCode < 300) {
                  resolve();
                } else {
                  reject(new Error(`Slack API 응답: ${res.statusCode}`));
                }
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
            console.log('Slack 전송 완료 (#개발팀_커버링랩스)');

  notify-failure:
    name: 장애 알림
    runs-on: ubuntu-latest
    needs: [report]
    if: failure()
    steps:
      - name: Slack 장애 알림 전송
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          [ -z "$SLACK_BOT_TOKEN" ] && exit 0
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -X POST "https://slack.com/api/chat.postMessage" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -d "{\"channel\":\"C0AUK6902BE\",\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*weekly-blocking-report 실패*  — 이번 주 차단율 집계 누락\n<${RUN_URL}|수동 재실행>  (Actions → Run workflow → days_back 입력)\"}}]}" || true
