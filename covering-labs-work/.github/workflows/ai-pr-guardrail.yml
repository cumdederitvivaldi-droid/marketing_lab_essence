name: AI PR Guardrail

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled, closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  check-ai-label:
    name: AI/후속수정 라벨 확인
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      failure_code: ${{ steps.check.outputs.failure_code }}
      failure_reason: ${{ steps.check.outputs.failure_reason }}
      failure_guide: ${{ steps.check.outputs.failure_guide }}
    steps:
      - name: PR 본문 파싱 및 라벨 적용
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pr_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const fail = (code, reason, guide) => {
              core.setOutput('failure_code', code);
              core.setOutput('failure_reason', reason);
              core.setOutput('failure_guide', guide);
              core.setFailed(reason);
            };

            const aiGenerated = /- \[x\] `ai-generated`/i.test(body);
            const aiAssisted  = /- \[x\] `ai-assisted`/i.test(body);
            const noAi        = /- \[x\] `no-ai`/i.test(body);

            const selectedCount = [aiGenerated, aiAssisted, noAi].filter(Boolean).length;
            if (selectedCount !== 1) {
              fail(
                'ai-label-missing',
                `AI 사용 여부 체크박스가 ${selectedCount}개 선택됨 (정확히 1개 필요)`,
                'PR 본문 *🤖 AI 사용 여부* 섹션에서 `ai-generated` / `ai-assisted` / `no-ai` 중 정확히 1개를 `- [x]` 로 체크하세요.'
              );
              return;
            }

            let appliedLabel = null;
            if (aiGenerated)     appliedLabel = 'ai-generated';
            else if (aiAssisted) appliedLabel = 'ai-assisted';
            else if (noAi)       appliedLabel = 'no-ai';

            const aiLabels = ['ai-generated', 'ai-assisted', 'no-ai'];

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number
            });
            const currentLabels = labels.map(l => l.name);

            for (const label of aiLabels) {
              if (currentLabels.includes(label)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: pr_number, name: label }).catch(e => {
                  if (e.status !== 404) throw e;
                });
              }
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number: pr_number, labels: [appliedLabel] });

            const normalChange = /- \[x\] `normal-change`/i.test(body);
            const postReleaseFix = /- \[x\] `post-release-fix`/i.test(body);
            const hotfix = /- \[x\] `hotfix`/i.test(body);

            const followupSelectedCount = [normalChange, postReleaseFix, hotfix].filter(Boolean).length;
            if (followupSelectedCount !== 1) {
              fail(
                'followup-label-missing',
                `후속수정 구분 체크박스가 ${followupSelectedCount}개 선택됨 (정확히 1개 필요)`,
                'PR 본문 *🚨 후속 수정 여부* 섹션에서 `normal-change` / `post-release-fix` / `hotfix` 중 정확히 1개를 `- [x]` 로 체크하세요. 버그 수정이라도 일반 변경이면 `normal-change` 를 선택합니다.'
              );
              return;
            }

            const followupLabels = ['post-release-fix', 'hotfix'];
            const { data: updatedLabels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number
            });
            const allLabels = updatedLabels.map(l => l.name);

            for (const label of followupLabels) {
              if (allLabels.includes(label)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: pr_number, name: label }).catch(e => {
                  if (e.status !== 404) throw e;
                });
              }
            }

            let followupLabel = null;
            if (postReleaseFix) followupLabel = 'post-release-fix';
            if (hotfix) followupLabel = 'hotfix';

            if (followupLabel) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr_number, labels: [followupLabel] });
            }

            const isFollowup = postReleaseFix || hotfix;

            if (isFollowup) {
              const causeMatch = body.match(/원인 PR:\s*(#\d+)/i);
              const problemCodeMatch = body.match(/문제 코드\/파일:\s*(.+)/i);
              if (!causeMatch) {
                fail(
                  'cause-pr-missing',
                  'post-release-fix/hotfix PR 에 원인 PR 번호 누락',
                  'PR 본문 *🔗 후속 수정 PR인 경우 필수 입력* 섹션의 `원인 PR:` 에 원본 PR 번호를 `#123` 형식으로 입력하세요. 예: `원인 PR: #72`'
                );
                return;
              }
              const causePrNumber = parseInt(causeMatch[1].slice(1), 10);
              if (causePrNumber === pr_number) {
                fail(
                  'cause-pr-self',
                  `원인 PR 이 현재 PR(#${pr_number}) 자신으로 지정됨`,
                  `현재 PR 번호(#${pr_number})가 아니라 실제 원본 PR 번호를 입력하세요.`
                );
                return;
              }
              try {
                await github.rest.pulls.get({ owner, repo, pull_number: causePrNumber });
              } catch (e) {
                const status = e.status;
                if (status === 404) {
                  fail(
                    'cause-pr-not-found',
                    `원인 PR #${causePrNumber} 를 찾을 수 없음 (404)`,
                    `레포에 #${causePrNumber} PR 이 존재하지 않습니다. 번호를 다시 확인하세요.`
                  );
                } else if (status === 403) {
                  fail(
                    'cause-pr-api-403',
                    `원인 PR #${causePrNumber} 조회 권한 오류 (403): ${e.message}`,
                    `GitHub API 권한 문제로 원인 PR 유효성을 확인할 수 없습니다. workflow 의 permissions 설정을 점검하거나 잠시 후 재시도하세요.`
                  );
                } else if (status === 429) {
                  fail(
                    'cause-pr-api-429',
                    `원인 PR #${causePrNumber} 조회 rate limit (429)`,
                    `GitHub API rate limit 에 걸렸습니다. 몇 분 후 PR body 를 아무거나 수정(스페이스 추가 등)해서 워크플로를 재트리거하세요.`
                  );
                } else {
                  fail(
                    'cause-pr-api-error',
                    `원인 PR #${causePrNumber} 조회 API 오류 (status=${status ?? 'unknown'}): ${e.message}`,
                    `GitHub API 일시 오류입니다. 잠시 후 PR body 를 수정해 워크플로를 재트리거하세요. 반복되면 Actions 로그에서 상세 확인.`
                  );
                }
                return;
              }
              if (!problemCodeMatch || /^N\/A\s*$/i.test(problemCodeMatch[1].trim()) || /^<!--/.test(problemCodeMatch[1].trim())) {
                fail(
                  'problem-files-missing',
                  'post-release-fix/hotfix PR 에 문제 코드/파일 누락',
                  'PR 본문 *🔗 후속 수정 PR인 경우 필수 입력* 섹션의 `문제 코드/파일:` 에 실제 파일 경로를 입력하세요 (예: `apps/private/foo/src/bar.ts`). `N/A` 는 `normal-change` 에서만 허용됩니다.'
                );
                return;
              }
            }

            console.log(`AI 라벨 확인 완료: ${appliedLabel} | 후속수정 구분: ${followupLabel || 'normal-change'}`);

      - name: 통과 시 guardrail-notified 마커 라벨 제거
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: pr_number, name: 'guardrail-notified'
              });
              console.log('guardrail-notified 라벨 제거 — 다음 실패 사이클에서 알림 재발송 가능');
            } catch (e) {
              if (e.status !== 404) throw e;
            }

  mark-cause-pr-followup:
    name: 원인 PR에 had-followup 라벨 추가
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.action == 'closed'
    outputs:
      failure_code: ${{ steps.mark.outputs.failure_code }}
      failure_reason: ${{ steps.mark.outputs.failure_reason }}
      failure_guide: ${{ steps.mark.outputs.failure_guide }}
    steps:
      - name: post-release-fix/hotfix 머지 시 원인 PR에 had-followup 라벨
        id: mark
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const fail = (code, reason, guide) => {
              core.setOutput('failure_code', code);
              core.setOutput('failure_reason', reason);
              core.setOutput('failure_guide', guide);
              core.setFailed(reason);
            };

            const isFollowup = labels.includes('post-release-fix') || labels.includes('hotfix');
            if (!isFollowup) return;

            const causeMatch = body.match(/원인 PR:\s*#(\d+)/i);
            if (!causeMatch) {
              fail(
                'merge-cause-pr-missing',
                'post-release-fix/hotfix PR 이 머지되었으나 원인 PR 번호 누락',
                '이미 머지된 PR 입니다. PR 본문을 열어 `원인 PR: #번호` 를 추가하면 had-followup 자동 라벨링이 트리거됩니다. 수동으로 원인 PR 에 `had-followup` 라벨을 직접 붙이셔도 됩니다.'
              );
              return;
            }

            const causePrNumber = parseInt(causeMatch[1]);
            const currentPrNumber = context.payload.pull_request.number;
            if (causePrNumber === currentPrNumber) {
              fail(
                'merge-cause-pr-self',
                `원인 PR 이 현재 PR(#${currentPrNumber}) 자신`,
                '머지된 PR 본문의 `원인 PR:` 을 실제 원본 PR 번호로 수정 후 수동으로 원인 PR 에 `had-followup` 라벨을 붙이세요.'
              );
              return;
            }
            try {
              await github.rest.pulls.get({ owner, repo, pull_number: causePrNumber });
            } catch (e) {
              const status = e.status;
              if (status === 404) {
                fail(
                  'merge-cause-pr-not-found',
                  `원인 PR #${causePrNumber} 를 찾을 수 없음 (404)`,
                  `머지된 PR 본문의 '원인 PR: #${causePrNumber}' 번호가 잘못되었습니다. 올바른 PR 번호로 수정하고 수동으로 해당 PR 에 had-followup 라벨을 붙이세요.`
                );
              } else if (status === 403) {
                fail(
                  'merge-cause-pr-api-403',
                  `원인 PR #${causePrNumber} 조회 권한 오류 (403): ${e.message}`,
                  `API 권한 문제입니다. workflow permissions 점검 후 수동으로 원인 PR 에 had-followup 라벨을 붙이세요.`
                );
              } else if (status === 429) {
                fail(
                  'merge-cause-pr-api-429',
                  `원인 PR #${causePrNumber} 조회 rate limit (429)`,
                  `GitHub API rate limit 입니다. 몇 분 후 수동으로 원인 PR 에 had-followup 라벨을 붙이세요.`
                );
              } else {
                fail(
                  'merge-cause-pr-api-error',
                  `원인 PR #${causePrNumber} 조회 API 오류 (status=${status ?? 'unknown'}): ${e.message}`,
                  `GitHub API 일시 오류입니다. 수동으로 원인 PR 에 had-followup 라벨을 붙이세요. Actions 로그에서 상세 확인.`
                );
              }
              return;
            }
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: causePrNumber,
                labels: ['had-followup']
              });
              console.log(`원인 PR #${causePrNumber}에 had-followup 라벨 추가`);
            } catch (e) {
              fail(
                'had-followup-api-failed',
                `had-followup 라벨 추가 API 실패 (PR #${causePrNumber}): ${e.message}`,
                `GitHub API 오류입니다. 잠시 후 수동으로 PR #${causePrNumber} 에 had-followup 라벨을 추가하세요.`
              );
            }

  notify-failure:
    name: 장애 알림
    runs-on: ubuntu-latest
    needs: [check-ai-label, mark-cause-pr-followup]
    # always() + 명시적 result 체크: 한쪽 잡이 skipped(if 조건 불만족)여도 다른 쪽 failed 시 안전하게 트리거
    if: always() && (needs.check-ai-label.result == 'failure' || needs.mark-cause-pr-followup.result == 'failure')
    steps:
      - name: 디듀프 — 같은 PR 에 이미 알림 발송됐는지 확인
        id: dedup
        if: github.event.pull_request != null
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number
            });
            const alreadyNotified = labels.some(l => l.name === 'guardrail-notified');
            if (alreadyNotified) {
              console.log('guardrail-notified 라벨 존재 — 동일 PR 중복 알림 차단');
            }
            core.setOutput('should_send', alreadyNotified ? 'false' : 'true');

      - name: Slack 장애 알림 전송 (실패 사유 + 해결 가이드 포함)
        id: slack_notify
        if: steps.dedup.outputs.should_send == 'true' || github.event.pull_request == null
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHECK_FAILURE_CODE: ${{ needs.check-ai-label.outputs.failure_code }}
          CHECK_FAILURE_REASON: ${{ needs.check-ai-label.outputs.failure_reason }}
          CHECK_FAILURE_GUIDE: ${{ needs.check-ai-label.outputs.failure_guide }}
          MARK_FAILURE_CODE: ${{ needs.mark-cause-pr-followup.outputs.failure_code }}
          MARK_FAILURE_REASON: ${{ needs.mark-cause-pr-followup.outputs.failure_reason }}
          MARK_FAILURE_GUIDE: ${{ needs.mark-cause-pr-followup.outputs.failure_guide }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "SLACK_BOT_TOKEN 비어있음 — 발송 스킵, sent=false"
            echo "sent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 어떤 잡이 실패했는지에 따라 REASON/GUIDE 선택
          if [ -n "$CHECK_FAILURE_CODE" ]; then
            CODE="$CHECK_FAILURE_CODE"
            REASON="$CHECK_FAILURE_REASON"
            GUIDE="$CHECK_FAILURE_GUIDE"
            STAGE="PR 라벨 검증 (check-ai-label)"
          elif [ -n "$MARK_FAILURE_CODE" ]; then
            CODE="$MARK_FAILURE_CODE"
            REASON="$MARK_FAILURE_REASON"
            GUIDE="$MARK_FAILURE_GUIDE"
            STAGE="원인 PR 라벨링 (mark-cause-pr-followup)"
          else
            CODE="unknown"
            REASON="워크플로 실행 중 알 수 없는 오류 발생"
            GUIDE="Actions 로그에서 상세 원인을 확인하세요."
            STAGE="알 수 없음"
          fi

          python3 - "$PR_URL" "$PR_NUMBER" "$PR_TITLE" "$PR_AUTHOR" "$RUN_URL" "$STAGE" "$CODE" "$REASON" "$GUIDE" <<'PYEOF' > /tmp/slack-payload.json
          import json, sys
          pr_url, pr_number, pr_title, pr_author, run_url, stage, code, reason, guide = sys.argv[1:]
          blocks = [
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f":rotating_light: *AI PR Guardrail 실패* — KR3 트래킹 정합성 가드가 차단됐어요",
                  },
              },
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"*PR*\n<{pr_url}|#{pr_number}> {pr_title}"},
                      {"type": "mrkdwn", "text": f"*작성자*\n`{pr_author}`"},
                      {"type": "mrkdwn", "text": f"*실패 단계*\n{stage}"},
                      {"type": "mrkdwn", "text": f"*실패 코드*\n`{code}`"},
                  ],
              },
              {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f"*실패 사유*\n{reason}"},
              },
              {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f":wrench: *해결 방법*\n{guide}"},
              },
              {
                  "type": "context",
                  "elements": [
                      {"type": "mrkdwn", "text": f"<{run_url}|Actions 로그 보기>  ·  PR body 수정 후 자동 재검증됩니다."},
                  ],
              },
          ]
          print(json.dumps({"channel": "C0AUK6902BE", "blocks": blocks}, ensure_ascii=False))
          PYEOF

          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            --data-binary @/tmp/slack-payload.json) || RESPONSE='{"ok":false,"error":"curl_failed"}'

          if echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('ok') else 1)" 2>/dev/null; then
            echo "Slack 발송 성공"
            echo "sent=true" >> "$GITHUB_OUTPUT"
          else
            echo "Slack 발송 실패 — 마커 부착 스킵: $RESPONSE" >&2
            echo "sent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 발송 완료 마커 — guardrail-notified 라벨 부착
        if: steps.dedup.outputs.should_send == 'true' && steps.slack_notify.outputs.sent == 'true' && github.event.pull_request != null
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr_number, labels: ['guardrail-notified']
              });
              console.log('guardrail-notified 라벨 부착 — 같은 PR 중복 알림 차단 모드 활성');
            } catch (e) {
              console.log(`라벨 부착 실패 (무시): ${e.message}`);
            }
