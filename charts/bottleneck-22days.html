<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>첫 이용 후 경과일 × 잔존율 — 22일 병목</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --blue-50:#EEF3FF; --blue-100:#DCE5FF; --blue-300:#8FAEFF; --blue-400:#5C86FF;
    --blue-500:#2D5BFF; --blue-600:#1B45E0;
    --ink-50:#F7F9FD; --ink-100:#EEF1F6; --ink-200:#DDE2EB; --ink-400:#8B95A6;
    --ink-500:#5B6675; --ink-600:#3A4252; --ink-700:#1F2837; --ink-800:#131A26; --ink-900:#0A0E16;
    --rose-500:#EF4444; --rose-100:#FEE2E2;
    --font-sans:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --shadow-sm:0 2px 6px rgba(15,25,50,.06);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font-sans); color:var(--ink-800); background:var(--ink-50);
    font-feature-settings:"ss01" 1,"tnum" 1;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    padding:40px 32px 56px;
  }
  .wrap{max-width:1180px; margin:0 auto;}
  .eyebrow{font-family:var(--font-mono); font-size:11px; font-weight:600;
    letter-spacing:.14em; text-transform:uppercase; color:var(--rose-500); margin-bottom:14px;}
  h1.title{font-size:34px; font-weight:800; letter-spacing:-.02em; line-height:1.1;
    margin:0 0 12px; color:var(--ink-900);}
  h1.title .rose{color:var(--rose-500);}
  .sub{font-size:14.5px; color:var(--ink-500); line-height:1.6; max-width:880px; margin-bottom:28px;}
  .sub b{color:var(--ink-800); font-weight:700;}

  .card{background:#fff; border:1px solid var(--ink-100); border-radius:14px;
    padding:24px 28px 22px; box-shadow:var(--shadow-sm);}
  .card-title{font-size:16px; font-weight:700; color:var(--ink-800); margin-bottom:4px;}
  .card-sub{font-size:12px; color:var(--ink-500); margin-bottom:18px;}
  .legend{display:flex; flex-wrap:wrap; gap:14px; row-gap:8px; font-size:11.5px;
    color:var(--ink-600); margin-bottom:10px; align-items:center;}
  .lg-item{display:inline-flex; align-items:center; gap:6px;}
  .lg-dot{width:9px; height:9px; border-radius:50%; display:inline-block;}
  .lg-vline{width:2px; height:11px; display:inline-block;}
  .lg-sep{width:1px; height:12px; background:var(--ink-200);}
  .chart-wrap{position:relative; height:540px;}

  /* D-day reference overlays */
  .ref-overlay{position:absolute; inset:0; pointer-events:none;}
  .ref-line{
    position:absolute;
    border-left:1.8px dashed currentColor;
    transform:translateX(-50%);
  }
  .ref-callout{
    position:absolute;
    transform:translateX(-50%);
    background:#fff; border:1.5px solid currentColor; border-radius:10px;
    padding:9px 14px;
    box-shadow:0 6px 18px rgba(15,25,50,.10);
    white-space:nowrap; line-height:1.25;
    text-align:center;
  }
  .ref-callout .ref-name{
    font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.08em;
    color:currentColor; margin-bottom:4px; display:block;
  }
  .ref-callout .ref-desc{
    font-family:var(--font-sans); font-size:13px; font-weight:700; color:var(--ink-800);
    display:block; margin-bottom:2px;
  }
  .ref-callout .ref-stat{
    font-family:var(--font-mono); font-size:11.5px; font-weight:600;
    color:var(--ink-500); display:block;
  }
  .ref-callout .ref-stat b{ color:currentColor; font-weight:700; font-size:12.5px; }
  .ref.rose{ color:#EF4444; }

  .point-label{
    position:absolute;
    background:#EF4444; color:#fff;
    font-family:var(--font-mono); font-size:11px; font-weight:700;
    padding:3px 8px; border-radius:6px;
    transform:translate(8px, -50%);
    box-shadow:0 4px 10px rgba(239,68,68,.25);
    white-space:nowrap;
  }
  .point-label::before{
    content:''; position:absolute;
    left:-4px; top:50%; transform:translateY(-50%);
    width:0; height:0;
    border-top:4px solid transparent;
    border-bottom:4px solid transparent;
    border-right:4px solid #EF4444;
  }

  .foot{margin-top:24px; padding-top:18px; border-top:1px solid var(--ink-200);
    display:flex; justify-content:space-between; font-size:11px;
    color:var(--ink-400); font-family:var(--font-mono); letter-spacing:.08em; text-transform:uppercase;}

  @media (max-width: 900px){
    body{padding:24px 16px;} h1.title{font-size:24px;}
    .card{padding:18px;} .chart-wrap{height:440px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="eyebrow">BOTTLENECK ANALYSIS · D22</div>
  <h1 class="title">첫 이용 후 <span class="rose">22일</span>이 분기점 — 재이용 가능성 급감</h1>
  <p class="sub">
    코호트 638명의 회차별 잔존 데이터를 <b>일(日) 축</b>으로 환산한 결과,
    첫 이용 후 <b>22일이 경과하면 잔존율이 45.5%까지 하락</b>합니다.
    22일이 재이용 가능성의 분기점입니다.
  </p>

  <div class="card">
    <div class="card-title">첫 이용 후 경과일 × 잔존율</div>
    <div class="card-sub">코호트 638명의 누적 잔존율 곡선 (회차별 데이터를 일 단위로 환산)</div>
    <div class="legend">
      <span class="lg-item"><span class="lg-dot" style="background:#2D5BFF;"></span> 잔존율 곡선</span>
      <span class="lg-sep"></span>
      <span class="lg-item"><span class="lg-vline" style="background:repeating-linear-gradient(180deg,#EF4444 0 3px,transparent 3px 6px);"></span> 재이용 가능성 급감 임계점</span>
    </div>
    <div class="chart-wrap">
      <canvas id="c-curve"></canvas>
      <div id="ref-overlay" class="ref-overlay"></div>
    </div>
  </div>

  <div class="foot">
    <span>이도형 · GROWTH MARKETING LAB</span>
    <span>BOTTLENECK · D22</span>
  </div>
</div>

<script>
  // 첫 이용(=1회차) 시점을 day 0으로 환산
  const points = [
    {d:0,    r:100.0, n:'1회차'},
    {d:8.4,  r:70.2,  n:'2회차'},
    {d:16.2, r:53.4,  n:'3회차'},
    {d:23.2, r:43.9,  n:'4회차'},
    {d:29.2, r:34.2,  n:'5회차'},
    {d:34.5, r:27.1,  n:'6회차'},
    {d:39.1, r:20.8,  n:'7회차'},
    {d:44.3, r:16.0,  n:'8회차'},
    {d:47.5, r:11.6,  n:'9회차'},
    {d:50.7, r:8.0,   n:'10회차'},
    {d:53.5, r:5.8,   n:'11회차'},
    {d:55.9, r:4.4,   n:'12회차'},
    {d:58.1, r:4.2,   n:'13회차'},
    {d:72.5, r:0.9,   n:'21회차'},
  ];

  // 22일 시점의 잔존율 보간값 (3회차 day 16.2 ↔ 4회차 day 23.2 사이 선형 보간)
  const D22_DAY = 22;
  const D22_RETENTION = 53.4 + (43.9 - 53.4) * (D22_DAY - 16.2) / (23.2 - 16.2); // ≈ 45.5

  Chart.defaults.font.family = '"Pretendard Variable", -apple-system, sans-serif';
  Chart.defaults.font.size = 11;
  Chart.defaults.color = '#5B6675';
  Chart.defaults.plugins.legend.display = false;

  const chart = new Chart(document.getElementById('c-curve'), {
    type:'line',
    data:{
      datasets:[
        {
          label:'잔존율',
          data: points.map(p => ({ x:p.d, y:p.r })),
          borderColor:'#2D5BFF',
          backgroundColor:(ctx)=>{
            const {chart} = ctx;
            const {ctx:c, chartArea} = chart;
            if(!chartArea) return 'rgba(45,91,255,0.12)';
            const g = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            g.addColorStop(0, 'rgba(45,91,255,0.22)');
            g.addColorStop(1, 'rgba(45,91,255,0.02)');
            return g;
          },
          borderWidth:2.5,
          tension:.3,
          fill:true,
          pointRadius:4,
          pointHoverRadius:6,
          pointBackgroundColor:'#2D5BFF',
          pointBorderColor:'#fff',
          pointBorderWidth:2,
          order:2,
        },
        {
          // D22 highlight dot — 곡선 위 보간점 강조
          label:'D22',
          data: [{ x:D22_DAY, y:D22_RETENTION }],
          showLine:false,
          pointRadius:8,
          pointHoverRadius:10,
          pointBackgroundColor:'#EF4444',
          pointBorderColor:'#fff',
          pointBorderWidth:3,
          order:1,
        }
      ]
    },
    options:{
      maintainAspectRatio:false,
      layout:{ padding:{ top:110 } },
      interaction:{ mode:'nearest', intersect:false, axis:'x' },
      plugins:{
        tooltip:{
          backgroundColor:'#0A0E16', titleColor:'#fff', bodyColor:'#DDE2EB',
          padding:12, cornerRadius:8, displayColors:false,
          filter: (item) => item.datasetIndex === 0,
          callbacks:{
            title: (items)=> {
              const p = points[items[0].dataIndex];
              return `${p.n} · 첫 이용 후 ${p.d.toFixed(1)}일`;
            },
            label: (ctx)=> ` 잔존율: ${ctx.parsed.y.toFixed(1)}%`,
          }
        }
      },
      scales:{
        x:{
          type:'linear', min:0, max:80,
          grid:{ color:'#EEF1F6', drawBorder:false },
          ticks:{
            font:{ size:10 },
            stepSize:10,
            callback:(v)=> v + '일'
          },
          title:{ display:true, text:'첫 이용 후 경과일', color:'#8B95A6', font:{ size:11, weight:'600' } }
        },
        y:{
          beginAtZero:true, max:100,
          grid:{ color:'#EEF1F6', drawBorder:false },
          ticks:{ font:{ size:10 }, callback:(v)=> v+'%' },
          title:{ display:true, text:'잔존율 (%)', color:'#8B95A6', font:{ size:11, weight:'600' } }
        }
      },
      animation:{
        duration:800,
        onComplete: placeRefMarkers,
      },
    },
    plugins:[{
      id:'refPlace',
      afterUpdate(){ requestAnimationFrame(placeRefMarkers); },
    }]
  });

  function placeRefMarkers(){
    const overlay = document.getElementById('ref-overlay');
    if(!overlay || !chart) return;
    overlay.innerHTML = '';
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    const area = chart.chartArea;
    if(!xScale || !yScale || !area) return;

    const x = xScale.getPixelForValue(D22_DAY);
    const yPoint = yScale.getPixelForValue(D22_RETENTION);
    if(x == null || isNaN(x)) return;

    // Vertical reference line at D22
    const line = document.createElement('div');
    line.className = 'ref-line ref rose';
    line.style.left = `${x}px`;
    line.style.top = `${area.top}px`;
    line.style.height = `${area.bottom - area.top}px`;
    overlay.appendChild(line);

    // Top callout at D22
    const callout = document.createElement('div');
    callout.className = 'ref-callout ref rose';
    callout.style.left = `${x}px`;
    callout.style.top = `8px`;
    callout.innerHTML = `
      <span class="ref-name">D22</span>
      <span class="ref-desc">재이용 가능성 급감 임계점</span>
      <span class="ref-stat">잔존율 <b>${D22_RETENTION.toFixed(1)}%</b></span>
    `;
    overlay.appendChild(callout);

    // Inline label next to highlight dot
    const inline = document.createElement('div');
    inline.className = 'point-label';
    inline.style.left = `${x}px`;
    inline.style.top = `${yPoint}px`;
    inline.textContent = `${D22_RETENTION.toFixed(1)}%`;
    overlay.appendChild(inline);
  }

  let resizeT;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(placeRefMarkers, 80);
  });
</script>
</body>
</html>
