# 기본 server block — IP 직접 접근(Host header 미일치) 대응
# 2026-04-17: VPN 전용화 — labs.covering.app 과 동일한 allowlist.
# VPN 연결된 상태(AWS Client VPN NAT 43.200.63.250) 에서만 접근 가능.
# 비 VPN 경우 403 반환. 앱은 반드시 labs.covering.app 도메인으로 접근.
server {
    listen 80 default_server;
    server_name _;

    allow 43.200.63.250/32;  # AWS Client VPN (covering-vpn-v2) NAT Gateway egress
    allow 10.0.0.0/16;        # AWS VPC (Site-to-Site VPN)
    allow 10.2.0.0/22;        # 사내망 (legacy)
    deny all;

    # location / 블록 의도적 생략:
    # - return directive 는 nginx rewrite phase 에서 실행되어 access phase(allow/deny)를 우회함
    # - 경로 없이 두면 VPN 통과 시 404 (앱 없음) / 비 VPN 시 403 으로 명확히 차단됨
}
