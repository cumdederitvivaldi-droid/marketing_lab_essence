# HTTPS - VPN 전용
# AWS Client VPN(covering-vpn-v2) NAT IP 및 AWS/사내망 CIDR 만 허용.
# Let's Encrypt 갱신은 DNS-01 (Route 53) 방식이므로 port 80/443 방화벽 제한과 무관.
server {
    server_name labs.covering.app;

    # VPN/내부망만 허용
    allow 43.200.63.250/32;  # AWS Client VPN (covering-vpn-v2) NAT Gateway egress
    allow 10.0.0.0/16;        # AWS VPC (Site-to-Site VPN)
    allow 10.2.0.0/22;        # 사내망 (legacy)
    deny all;

    include /shared/nginx-confs/*.conf;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/labs.covering.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/labs.covering.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS 리다이렉트 (Let's Encrypt는 DNS-01/Route 53 갱신 — HTTP challenge 불필요)
server {
    if ($host = labs.covering.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name labs.covering.app;
    return 404; # managed by Certbot
}
