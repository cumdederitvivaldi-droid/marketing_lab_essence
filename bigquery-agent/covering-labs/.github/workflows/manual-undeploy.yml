name: Manual Undeploy

on:
  workflow_dispatch:
    inputs:
      vm:
        description: 'VM 종류'
        required: true
        type: choice
        options: [private, public]
      app:
        description: '앱 이름 (예: example-site)'
        required: true
        type: string

env:
  PROJECT_ID: covering-app-ccd23

jobs:
  undeploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (private)
        if: inputs.vm == 'private'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Authenticate to GCP (public)
        if: inputs.vm == 'public'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_PUBLIC }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Undeploy (private)
        if: inputs.vm == 'private'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DEPLOY_ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud compute scp --recurse scripts \
            covering-labs-instance-20260306-050059:/shared/ \
            --zone=asia-northeast3-a --project="$PROJECT_ID" \
            --ssh-key-expire-after=10m --quiet
          gcloud compute ssh covering-labs-instance-20260306-050059 \
            --zone=asia-northeast3-a --project="$PROJECT_ID" \
            --ssh-key-expire-after=10m --quiet \
            --command="SLACK_BOT_TOKEN='\${SLACK_BOT_TOKEN}' DEPLOY_ACTOR='\${DEPLOY_ACTOR}' COMMIT_SHA='\${COMMIT_SHA}' bash /shared/scripts/undeploy-app.sh ${{ inputs.app }}"

      - name: Undeploy (public)
        if: inputs.vm == 'public'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DEPLOY_ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud compute scp --recurse scripts \
            covering-labs-public:/shared/ \
            --zone=asia-northeast3-a --project="$PROJECT_ID" \
            --ssh-key-expire-after=10m --quiet
          gcloud compute ssh covering-labs-public \
            --zone=asia-northeast3-a --project="$PROJECT_ID" \
            --ssh-key-expire-after=10m --quiet \
            --command="SLACK_BOT_TOKEN='\${SLACK_BOT_TOKEN}' DEPLOY_ACTOR='\${DEPLOY_ACTOR}' COMMIT_SHA='\${COMMIT_SHA}' bash /shared/scripts/undeploy-app.sh ${{ inputs.app }}"
